<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPMG Research · Neural Briefing for NPs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter+Tight:wght@300..800&family=JetBrains+Mono:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=14">
</head>
<body data-focus="off" data-tweaks="off" data-neuro="on">
<div class="grain"></div>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="assets/brain-data.js?v=1"></script>

<script type="text/babel" src="assets/neural.jsx?v=14"></script>
<script type="text/babel" src="assets/shell.jsx?v=7"></script>
<script type="text/babel" src="assets/trial-alert.jsx?v=9"></script>
<script type="text/babel" src="assets/study-edu.jsx?v=1"></script>
<script type="text/babel" src="assets/pages.jsx?v=8"></script>

<script>
  // Trial registry data (inclusion/exclusion, endpoints, etc) pulled from ClinicalTrials.gov
  (async () => {
    try {
      const [r1, r2] = await Promise.all([
        fetch("assets/trial-data.json"),
        fetch("assets/study-briefs.json"),
      ]);
      window.TRIAL_DATA = await r1.json();
      window.STUDY_BRIEFS = await r2.json();
      window.dispatchEvent(new Event("trial-data-ready"));
    } catch (e) { window.TRIAL_DATA = window.TRIAL_DATA || {}; window.STUDY_BRIEFS = window.STUDY_BRIEFS || {}; }
  })();
</script>

<script type="text/babel">
const { useState, useEffect } = React;

function parseHash() {
  const h = window.location.hash.replace(/^#\/?/, "") || "";
  const parts = h.split("/").filter(Boolean);
  return { parts, hash: "#/" + parts.join("/") };
}

function App() {
  const [route, setRoute] = useState(parseHash());
  useEffect(() => {
    const on = () => {
      setRoute(parseHash());
      window.scrollTo(0, 0);
    };
    window.addEventListener("hashchange", on);
    return () => window.removeEventListener("hashchange", on);
  }, []);

  const [p0, p1] = route.parts;
  let page, current = "#/";
  if (!p0) { page = <HomePage/>; current = "#/"; }
  else if (p0 === "studies" && !p1) { page = <StudiesPage/>; current = "#/studies"; }
  else if (p0 === "studies" && p1) { page = <StudyDetailPage nctId={p1}/>; current = "#/studies"; }
  else if (p0 === "conditions" && !p1) { page = <ConditionsPage/>; current = "#/conditions"; }
  else if (p0 === "conditions" && p1) { page = <ConditionDetailPage slug={p1}/>; current = "#/conditions"; }
  else if (p0 === "locations" && !p1) { page = <LocationsPage/>; current = "#/locations"; }
  else if (p0 === "locations" && p1) { page = <LocationDetailPage slug={p1}/>; current = "#/locations"; }
  else if (p0 === "for-clinicians") { page = <ForCliniciansPage/>; current = "#/for-clinicians"; }
  else if (p0 === "refer") { page = <ReferPage/>; current = "#/refer"; }
  else if (p0 === "faq") { page = <FAQPage/>; current = "#/faq"; }
  else page = <NotFound/>;

  return (
    <>
      <ScrollProgress/>
      <Nav current={current}/>
      <main>{page}</main>
      <Footer/>
      <TweaksPanel/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
